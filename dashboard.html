<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arjun's Premium Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #f39c12;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --bg-color: #0a0a0a;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #1e1e1e, var(--bg-color)); 
            color: #fff; margin: 0; display: flex; min-height: 100vh;
            align-items: flex-start;
        }

        /* Sidebar */
        nav {
            width: 240px; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            padding: 30px 20px; display: flex; flex-direction: column;
            position: fixed; height: 100vh; z-index: 200;
        }

        nav h2 { color: var(--accent); font-size: 1.2rem; margin-bottom: 30px; letter-spacing: 1px; }
        .cat-btn { 
            background: none; border: none; color: #888; text-align: left;
            padding: 12px 0; cursor: pointer; font-size: 0.95rem; transition: 0.3s;
            display: block; width: 100%;
        }
        .cat-btn:hover, .cat-btn.active { color: var(--accent); padding-left: 10px; }

        /* Main Content */
        main { flex: 1; margin-left: 240px; padding: 0 40px 40px 40px; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100; padding: 30px 0;
            background: var(--bg-color); border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
        }

        .search-bar {
            background: var(--glass); border: 1px solid var(--border);
            padding: 12px 25px; border-radius: 30px; color: #fff; width: 350px; outline: none;
        }

        /* Grid */
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--glass); backdrop-filter: blur(10px);
            border: 1px solid var(--border); border-radius: 20px;
            padding: 20px; transition: 0.4s; overflow: hidden;
        }

        .card:hover { transform: translateY(-8px); border-color: var(--accent); }

        .img-container {
            width: 100%; height: 220px; background: #222; border-radius: 15px;
            overflow: hidden; display: flex; align-items: center; justify-content: center;
        }

        .card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        
        .badge { font-size: 0.65rem; background: var(--accent); color: #000; padding: 2px 8px; border-radius: 4px; font-weight: bold; }
        .card h3 { font-size: 1.1rem; margin: 15px 0 5px 0; color: #eee; }
        .brand { font-size: 0.8rem; color: #666; margin-bottom: 10px; display: block; }
        .price { font-size: 1.4rem; font-weight: 600; color: #fff; }

        #loading-trigger { text-align: center; padding: 50px; color: var(--accent); font-weight: bold; letter-spacing: 2px; }
        #no-results { text-align: center; padding: 100px; color: #555; display: none; }

        @media (max-width: 768px) {
            nav { display: none; }
            main { margin-left: 0; padding: 20px; }
        }
    </style>
</head>
<body>

    <nav id="sidebar">
        <h2>CATEGORIES</h2>
        <button class="cat-btn active" onclick="filterCategory(event, 'all')">All Products</button>
        <button class="cat-btn" onclick="filterCategory(event, 'smartphones')">Smartphones</button>
        <button class="cat-btn" onclick="filterCategory(event, 'laptops')">Laptops</button>
        <button class="cat-btn" onclick="filterCategory(event, 'fragrances')">Fragrances</button>
        <button class="cat-btn" onclick="filterCategory(event, 'skincare')">Skincare</button>
        <button class="cat-btn" onclick="filterCategory(event, 'groceries')">Groceries</button>
        
        <a href="login.html" style="margin-top: auto; color: #ff4d4d; text-decoration: none; font-size: 0.9rem;">Logout</a>
    </nav>

    <main>
        <header>
            <h1 id="page-title">Discovery</h1>
            <input type="text" id="search-input" class="search-bar" placeholder="Search brands, items...">
        </header>

        <div id="no-results">No items found matching your search.</div>
        <div class="grid" id="product-list"></div>
        <div id="loading-trigger">SCANNING INVENTORY...</div>
    </main>

    <script>
        const productList = document.getElementById('product-list');
        const searchInput = document.getElementById('search-input');
        const pageTitle = document.getElementById('page-title');
        const loadingTrigger = document.getElementById('loading-trigger');
        const noResults = document.getElementById('no-results');
        
        let allProducts = [];
        let filteredProducts = [];
        let currentIndex = 0;
        const limit = 8;
        let isFetching = false;

        async function init() {
            try {
                // Fetching 100 items for high variety
                const response = await fetch('https://dummyjson.com/products?limit=100');
                const data = await response.json();
                allProducts = data.products;
                filteredProducts = [...allProducts];
                renderItems();
            } catch (err) { console.error("Error loading products:", err); }
        }

        function renderItems() {
            const nextBatch = filteredProducts.slice(currentIndex, currentIndex + limit);
            
            if (filteredProducts.length === 0) {
                noResults.style.display = 'block';
                loadingTrigger.style.display = 'none';
                return;
            } else {
                noResults.style.display = 'none';
            }

            nextBatch.forEach(p => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="img-container"><img src="${p.thumbnail}"></div>
                    <div style="margin-top:15px;"><span class="badge">${p.category}</span></div>
                    <h3>${p.title}</h3>
                    <span class="brand">${p.brand || 'Premium Brand'}</span>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span class="price">$${p.price}</span>
                        <button style="background:var(--accent); border:none; border-radius:8px; padding:8px 15px; cursor:pointer; font-weight:bold;">Add</button>
                    </div>
                `;
                productList.appendChild(card);
            });

            currentIndex += limit;

            // FIX: Hide loading trigger if all items in current view are loaded
            if (currentIndex >= filteredProducts.length) {
                loadingTrigger.style.display = 'none';
            } else {
                loadingTrigger.style.display = 'block';
            }
        }

        function filterCategory(e, cat) {
            // UI Sidebar Update
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            e.target.classList.add('active');
            pageTitle.innerText = cat.charAt(0).toUpperCase() + cat.slice(1);

            // Logic Update
            currentIndex = 0;
            productList.innerHTML = "";
            filteredProducts = (cat === 'all') ? allProducts : allProducts.filter(p => p.category === cat);
            renderItems();
        }

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            currentIndex = 0;
            productList.innerHTML = "";
            filteredProducts = allProducts.filter(p => 
                p.title.toLowerCase().includes(term) || (p.brand && p.brand.toLowerCase().includes(term))
            );
            renderItems();
        });

        window.addEventListener('scroll', () => {
            if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 300) {
                if (!isFetching && currentIndex < filteredProducts.length) {
                    isThrottled = true;
                    setTimeout(() => { 
                        renderItems(); 
                        isFetching = false; 
                    }, 400);
                }
            }
        });

        init();
    </script>
</body>
</html>
