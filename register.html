<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Arjun's Project</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 320px; }
        h2 { text-align: center; color: #f39c12; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #333; border-radius: 6px; background: #2a2a2a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #f39c12; border: none; border-radius: 6px; color: #121212; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:hover { background: #e67e22; }
        .link { text-align: center; margin-top: 15px; font-size: 0.9rem; }
        .link a { color: #f39c12; text-decoration: none; }
        #error-msg { color: #ff4d4d; font-size: 0.8rem; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Create Account</h2>
    <input type="email" id="reg-email" placeholder="Email Address">
    <input type="password" id="reg-password" placeholder="Create Password">
    <button id="register-btn">Sign Up</button>
    
    <div id="error-msg"></div>
    
    <div class="link">
        Already have an account? <a href="login.html">Login here</a>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  // Your Firebase Configuration
  const firebaseConfig = {
    apiKey: "AIzaSyB-IbuXrrvDwWoCEg-SsLR-zU4U1QyltuU",
    authDomain: "login-24804.firebaseapp.com",
    projectId: "login-24804",
    storageBucket: "login-24804.firebasestorage.app",
    messagingSenderId: "802080211728",
    appId: "1:802080211728:web:130d99c59c900360335b95",
    measurementId: "G-C0958JSTSZ"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const emailInput = document.getElementById('reg-email');
  const passwordInput = document.getElementById('reg-password');
  const registerBtn = document.getElementById('register-btn');
  const errorMsg = document.getElementById('error-msg');

  registerBtn.addEventListener('click', async () => {
    const email = emailInput.value;
    const password = passwordInput.value;
    errorMsg.innerText = "";

    try {
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      alert("Registration Successful! Welcome, " + userCredential.user.email);
      // Redirect to your main app or login page
      window.location.href = "login.html"; 
    } catch (error) {
      errorMsg.innerText = error.message;
    }
  });
</script>

</body>
</html>
